<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Signage Display</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/media/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/media/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/media/favicon/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="css/styles.css" rel="stylesheet">
    <!-- Legacy fallback CSS for older smart TVs (precedes inline modern CSS) -->
    <link href="css/signage-legacy.css" rel="stylesheet">
    <style>
        :root {
            --page-bg: #eef6ff;
            --panel-bg: #ffffff;
            --panel-soft: #f8fbff;
            --border: #d7e4f2;
            --text: #102033;
            --muted: #5f6f82;
            --blue: #1266d6;
            --blue-soft: #e0eeff;
            --green: #087a53;
            --green-soft: #dff8ed;
            --amber: #a55d00;
            --amber-soft: #fff2d8;
            --red: #b42318;
            --red-soft: #ffe3df;
            --shadow: 0 18px 50px rgba(29, 78, 137, 0.13);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Noto Sans Thai", "Noto Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: clamp(14px, 1vw, 18px);
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.94) 0%, rgba(238, 246, 255, 0.9) 48%, rgba(225, 244, 238, 0.72) 100%),
                var(--page-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: none;
        }

        .aspect-ratio-container {
            width: 100vw;
            height: 100vh;
        }

        .signage-shell {
            display: grid;
            grid-template-columns: minmax(0, 2.35fr) minmax(22rem, 1fr);
            grid-template-rows: minmax(0, 1fr);
            height: 100%;
            gap: clamp(0.8rem, 1.6vw, 1.4rem);
            padding: clamp(1rem, 2vw, 2rem);
            box-sizing: border-box;
        }

        .now-serving,
        .glass-card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .now-serving {
            position: relative;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto auto;
            min-width: 0;
            min-height: 0;
            border-radius: 18px;
            overflow: hidden;
        }

        .now-serving::before {
            content: "";
            position: absolute;
            inset: 0;
            border-top: clamp(0.55rem, 1vw, 0.85rem) solid var(--blue);
            pointer-events: none;
        }

        .hero-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1.25rem;
            padding: clamp(1.4rem, 2.4vw, 2.2rem) clamp(1.6rem, 3vw, 3rem) 0;
            position: relative;
            z-index: 1;
        }

        .now-serving-header {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .main-label-text,
        .sub-label-text {
            margin: 0;
            line-height: 1.08;
            letter-spacing: 0;
        }

        .main-label-text {
            font-size: clamp(1.9rem, 3.4vw, 3.4rem);
            font-weight: 800;
            color: var(--text);
        }

        .sub-label-text {
            font-size: clamp(1.15rem, 2vw, 2rem);
            font-weight: 800;
            color: var(--blue);
        }

        .token-focus {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 0;
            padding: clamp(0.5rem, 1vw, 0.9rem) clamp(1.6rem, 3vw, 3rem) 0;
        }

        .token-kicker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.45rem 1.1rem;
            border-radius: 999px;
            background: var(--blue-soft);
            color: var(--blue);
            font-size: clamp(1.2rem, 2vw, 2rem);
            font-weight: 800;
            line-height: 1.2;
            white-space: nowrap;
        }

        .token-kicker .kicker-en {
            font-size: 0.72em;
        }

        .token-display {
            width: 100%;
            margin: clamp(0.55rem, 1.1vw, 1rem) 0 0;
            color: var(--blue);
            font-size: clamp(13rem, 39vh, 30rem);
            font-weight: 950;
            line-height: 0.88;
            letter-spacing: 0;
            text-align: center;
            text-shadow: 0 10px 30px rgba(18, 102, 214, 0.13);
            font-variant-numeric: tabular-nums;
        }

        .counter-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: clamp(1rem, 2vw, 2rem);
            margin: 0 clamp(1.6rem, 3vw, 3rem) clamp(1.4rem, 2.4vw, 2.2rem);
            padding: clamp(1rem, 1.8vw, 1.5rem);
            border-radius: 14px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
        }

        .counter-copy {
            min-width: 0;
        }

        .counter-display {
            color: var(--text);
            font-size: clamp(5.5rem, 16vh, 13rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: 0;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        #datetime {
            flex: 0 0 auto;
            min-width: 12rem;
            text-align: right;
            color: var(--text);
        }

        #time,
        #date {
            display: block;
            line-height: 1.05;
            letter-spacing: 0;
        }

        #time {
            font-size: clamp(2.2rem, 3.8vw, 4.2rem);
            font-weight: 900;
        }

        #date {
            margin-top: 0.25rem;
            font-size: clamp(1.25rem, 2vw, 2.2rem);
            font-weight: 800;
            color: var(--muted);
        }

        .side-panel {
            display: grid;
            grid-template-rows: minmax(7rem, 0.8fr) minmax(0, 1.65fr) auto;
            gap: clamp(0.8rem, 1.6vw, 1.4rem);
            min-width: 0;
            min-height: 0;
        }

        .glass-card {
            border-radius: 14px;
            overflow: hidden;
            min-width: 0;
        }

        #announcement-area {
            min-height: 0;
            padding: clamp(0.6rem, 1vw, 0.9rem);
            background: #ffffff;
        }

        #announcement-banner-container {
            width: 100%;
            height: 100%;
            min-height: 0;
            border-radius: 10px;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #announcement-placeholder {
            color: var(--muted);
            font-size: clamp(1.4rem, 2.2vw, 2.4rem);
            font-weight: 800;
        }

        .banner-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            aspect-ratio: 480 / 107;
        }

        .list-card {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .list-card header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            padding: clamp(1rem, 1.7vw, 1.45rem) clamp(1rem, 1.8vw, 1.6rem);
            border-bottom: 1px solid var(--border);
            background: var(--panel-soft);
        }

        .list-title {
            display: grid;
            gap: 0.15rem;
            margin: 0;
            line-height: 1.08;
        }

        .list-title-th,
        .list-title-en {
            display: block;
            font-weight: 900;
            letter-spacing: 0;
        }

        .list-title-th {
            font-size: clamp(1.55rem, 2.5vw, 2.5rem);
            color: var(--text);
        }

        .list-title-en {
            font-size: clamp(1rem, 1.55vw, 1.55rem);
            color: var(--green);
        }

        .list-title-note {
            color: var(--muted);
            font-size: clamp(0.95rem, 1.4vw, 1.3rem);
            font-weight: 800;
            white-space: nowrap;
        }

        .list-scroll {
            flex: 1;
            overflow: hidden;
            padding: clamp(0.75rem, 1.4vw, 1.2rem);
            min-width: 0;
            min-height: 0;
        }

        #list-history-calls,
        #list-skipped-calls {
            list-style: none;
            padding: 0;
            margin: 0;
            min-width: 0;
        }

        #list-history-calls {
            display: flex;
            flex-direction: column;
            gap: clamp(0.45rem, 0.9vw, 0.8rem);
        }

        #list-skipped-calls {
            display: flex;
            flex-direction: row;
            gap: clamp(0.45rem, 0.9vw, 0.8rem);
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: clamp(0.6rem, 1vw, 1rem);
            min-width: 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #ffffff;
            padding: clamp(0.65rem, 1.1vw, 1rem) clamp(0.8rem, 1.3vw, 1.15rem);
            color: var(--text);
            font-size: clamp(2rem, 3.7vw, 3.8rem);
            font-weight: 850;
            line-height: 1.05;
            white-space: nowrap;
        }

        .history-item.italic {
            justify-content: center;
            color: var(--muted);
            font-style: normal;
            font-size: clamp(1.35rem, 2.1vw, 2rem);
            font-weight: 800;
            text-align: center;
        }

        .history-item strong {
            color: var(--green);
            font-weight: 950;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums;
        }

        .history-item .id-part,
        .history-item span:first-child {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .timestamp {
            flex: 0 0 auto;
            color: var(--muted);
            font-size: clamp(1rem, 1.6vw, 1.45rem);
            font-weight: 800;
            letter-spacing: 0;
            margin-left: 0.25rem;
        }

        .missed-card {
            border-color: #f3d69c;
            background: #fffdf8;
        }

        .missed-card header {
            padding-top: clamp(0.7rem, 1.2vw, 1rem);
            padding-bottom: clamp(0.7rem, 1.2vw, 1rem);
            background: var(--amber-soft);
            border-bottom-color: #f3d69c;
        }

        .missed-card .list-scroll {
            padding: clamp(0.6rem, 1vw, 0.85rem);
        }

        .missed-card .list-title-en {
            color: var(--amber);
        }

        #list-skipped-calls .history-item {
            flex: 0 0 auto;
            max-width: 100%;
            border-color: #f3d69c;
            background: #ffffff;
            color: var(--text);
            padding: 0.45rem 0.75rem;
            font-size: clamp(1.25rem, 1.9vw, 1.9rem);
        }

        #list-skipped-calls .history-item strong {
            color: var(--amber);
        }

        #list-skipped-calls .history-item .timestamp {
            display: none;
        }

        #list-skipped-calls .history-item.italic {
            flex: 1 1 100%;
            justify-content: center;
            text-align: center;
        }

        #sse-status-indicator {
            justify-self: end;
            align-self: end;
            margin: 0 clamp(1.6rem, 3vw, 3rem) clamp(0.9rem, 1.6vw, 1.4rem);
            min-width: 9rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: var(--blue-soft);
            color: var(--blue);
            font-size: clamp(0.8rem, 1vw, 1rem);
            font-weight: 800;
            line-height: 1.1;
            text-align: center;
            box-shadow: 0 6px 18px rgba(18, 102, 214, 0.1);
        }

        #sse-status-indicator[data-status='connecting'] {
            background: var(--amber-soft);
            color: var(--amber);
        }

        #sse-status-indicator[data-status='connected'] {
            background: var(--green-soft);
            color: var(--green);
        }

        #sse-status-indicator[data-status='disconnected'] {
            background: var(--red-soft);
            color: var(--red);
        }

        #sse-status-indicator[data-status='unsupported'] {
            background: #edf1f5;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .signage-shell {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(0, 1.55fr) minmax(0, 1fr);
            }

            .side-panel {
                grid-template-rows: minmax(5rem, 0.7fr) minmax(0, 1fr) auto;
            }

            .counter-panel {
                grid-template-columns: 1fr;
            }

            .counter-display {
                text-align: left;
            }
        }
    </style>
</head>

<body>
    <div class="aspect-ratio-container">
        <div class="signage-shell">
            <section class="now-serving" aria-labelledby="call-id-label">
                <div class="hero-header">
                    <div class="now-serving-header">
                        <p id="call-id-label" class="main-label-text">กำลังให้บริการ</p>
                        <p id="call-id-sublabels" class="sub-label-text">NOW SERVING</p>
                    </div>
                    <div id="datetime">
                        <span id="time"></span>
                        <span id="date"></span>
                    </div>
                </div>

                <div class="token-focus">
                    <div class="token-kicker">
                        <span class="kicker-th">หมายเลข</span>
                        <span>/</span>
                        <span class="kicker-en">NUMBER</span>
                    </div>
                    <div id="current-call-id" class="token-display">----</div>
                </div>

                <div class="counter-panel">
                    <div class="counter-copy">
                        <p id="location-label" class="main-label-text">ช่องบริการ</p>
                        <p id="location-sublabels" class="sub-label-text">COUNTER</p>
                    </div>
                    <div id="current-location" class="counter-display">----</div>
                </div>

                <div id="sse-status-indicator" title="SSE Connection Status" data-status="connecting">Connecting...</div>
            </section>

            <aside class="side-panel">
                <div id="announcement-area" class="glass-card">
                    <div id="announcement-banner-container">
                        <span id="announcement-placeholder">ประกาศ / ANNOUNCEMENTS</span>
                    </div>
                </div>

                <div class="glass-card list-card">
                    <header>
                        <h2 class="list-title">
                            <span class="list-title-th">เรียกแล้ว</span>
                            <span class="list-title-en">SERVED</span>
                        </h2>
                        <span class="list-title-note">NUMBER</span>
                    </header>
                    <div class="list-scroll">
                        <ul id="list-history-calls">
                            <li class="history-item italic text-gray-400">----</li>
                        </ul>
                    </div>
                </div>

                <div id="missed-tokens-card" class="glass-card list-card missed-card">
                    <header>
                        <h2 class="list-title">
                            <span class="list-title-th">ติดต่อเจ้าหน้าที่</span>
                            <span class="list-title-en">CONTACT STAFF</span>
                        </h2>
                        <span class="list-title-note">NUMBER</span>
                    </header>
                    <div class="list-scroll">
                        <ul id="list-skipped-calls">
                            <li class="history-item italic text-gray-400">----</li>
                        </ul>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <audio id="chimeAudio" src="media/chime.mp3" preload="auto" style="display:none;"></audio>
    <audio id="announcement-audio-player" preload="auto" style="display:none;"></audio>
    <audio id="tts-audio-player" preload="auto" style="display:none;"></audio>

    <script nomodule src="dist/polyfills.legacy.js"></script>
    <script nomodule src="dist/signage.legacy.js"></script>
    <script type="module" src="js/pages/signage/index.js"></script>
</body>

</html>
